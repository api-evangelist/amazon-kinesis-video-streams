aid: amazon-kinesis-video-streams
name: Amazon Kinesis Video Streams
description: >-
  Amazon Kinesis Video Streams makes it easy to securely stream video from
  connected devices to AWS for analytics, machine learning, playback, and other
  processing. It automatically provisions and elastically scales all the
  infrastructure needed to ingest streaming video data from millions of devices.
