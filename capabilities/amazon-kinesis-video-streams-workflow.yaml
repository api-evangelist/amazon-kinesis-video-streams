naftiko: 1.0.0-alpha2
info:
  label: Amazon Kinesis Video Streams Workflow
  description: Unified workflow capability for Amazon Kinesis Video Streams combining resource management and operations.
  tags:
  - Amazon Kinesis Video Streams
  - AWS
  - Workflow
  created: '2026-04-19'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    AWS_ACCESS_KEY_ID: AWS_ACCESS_KEY_ID
    AWS_SECRET_ACCESS_KEY: AWS_SECRET_ACCESS_KEY
capability:
  consumes:
  - type: http
    namespace: kinesis-video-streams
    baseUri: https://kinesisvideo.us-east-1.amazonaws.com
    description: Amazon Kinesis Video Streams service.
    authentication:
      type: apikey
      key: Authorization
      value: '{{AWS_ACCESS_KEY_ID}}'
      placement: header
    resources:
    - name: streams
      path: /streams
      description: Video stream management
      operations:
      - name: createstream
        method: POST
        description: Creates a new Kinesis video stream.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: liststreams
        method: GET
        description: Returns an array of StreamInfo objects.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: describestream
        method: GET
        description: Returns the most current information about the specified stream.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: channels
      path: /channels
      description: WebRTC signaling channel management
      operations:
      - name: createsignalingchannel
        method: POST
        description: Creates a signaling channel.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: listsignalingchannels
        method: GET
        description: Returns an array of ChannelInfo objects.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: describesignalingchannel
        method: GET
        description: Returns the most current information about the signaling channel.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: kinesis-video-streams-api
    description: REST API for Amazon Kinesis Video Streams workflow.
    resources: []
  - type: mcp
    port: 9090
    namespace: kinesis-video-streams-mcp
    transport: http
    description: MCP server for Amazon Kinesis Video Streams.
    tools:
    - name: streams-create-stream
      description: Creates a new Kinesis video stream.
      hints:
        readOnly: false
        idempotent: false
      call: kinesis-video-streams.createstream
      outputParameters:
      - type: object
        mapping: $.
    - name: streams-list-streams
      description: Returns an array of StreamInfo objects.
      hints:
        readOnly: true
        idempotent: true
      call: kinesis-video-streams.liststreams
      outputParameters:
      - type: object
        mapping: $.
    - name: streams-describe-stream
      description: Returns the most current information about the specified stream.
      hints:
        readOnly: true
        idempotent: true
      call: kinesis-video-streams.describestream
      outputParameters:
      - type: object
        mapping: $.
    - name: channels-create-signaling-channel
      description: Creates a signaling channel.
      hints:
        readOnly: false
        idempotent: false
      call: kinesis-video-streams.createsignalingchannel
      outputParameters:
      - type: object
        mapping: $.
    - name: channels-list-signaling-channels
      description: Returns an array of ChannelInfo objects.
      hints:
        readOnly: true
        idempotent: true
      call: kinesis-video-streams.listsignalingchannels
      outputParameters:
      - type: object
        mapping: $.
    - name: channels-describe-signaling-channel
      description: Returns the most current information about the signaling channel.
      hints:
        readOnly: true
        idempotent: true
      call: kinesis-video-streams.describesignalingchannel
      outputParameters:
      - type: object
        mapping: $.
