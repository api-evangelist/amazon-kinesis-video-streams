naftiko: 1.0.0-alpha1
info:
  label: Amazon Kinesis Video Streams
  description: Amazon Kinesis Video Streams API for managing kinesis video streams resources.
  tags:
  - Amazon Kinesis Video Streams
  - AWS
  created: '2026-04-19'
  modified: '2026-04-19'
binds:
- namespace: env
  keys:
    AWS_ACCESS_KEY_ID: AWS_ACCESS_KEY_ID
    AWS_SECRET_ACCESS_KEY: AWS_SECRET_ACCESS_KEY
capability:
  consumes:
  - type: http
    namespace: kinesis-video-streams
    baseUri: https://kinesisvideo.us-east-1.amazonaws.com
    description: Amazon Kinesis Video Streams service.
    authentication:
      type: apikey
      key: Authorization
      value: '{{AWS_ACCESS_KEY_ID}}'
      placement: header
    resources:
    - name: streams
      path: /streams
      description: Video stream management
      operations:
      - name: createstream
        method: POST
        description: Creates a new Kinesis video stream.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: liststreams
        method: GET
        description: Returns an array of StreamInfo objects.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: describestream
        method: GET
        description: Returns the most current information about the specified stream.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: channels
      path: /channels
      description: WebRTC signaling channel management
      operations:
      - name: createsignalingchannel
        method: POST
        description: Creates a signaling channel.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: listsignalingchannels
        method: GET
        description: Returns an array of ChannelInfo objects.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: describesignalingchannel
        method: GET
        description: Returns the most current information about the signaling channel.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8101
    namespace: kinesis-video-streams-rest
    resources: []
  - type: mcp
    port: 9101
    namespace: kinesis-video-streams-mcp
    transport: http
    tools:
    - name: createstream
      description: Creates a new Kinesis video stream.
      hints:
        readOnly: false
        idempotent: false
      call: kinesis-video-streams.createstream
      outputParameters:
      - type: object
        mapping: $.
    - name: liststreams
      description: Returns an array of StreamInfo objects.
      hints:
        readOnly: true
        idempotent: true
      call: kinesis-video-streams.liststreams
      outputParameters:
      - type: object
        mapping: $.
    - name: createsignalingchannel
      description: Creates a signaling channel.
      hints:
        readOnly: false
        idempotent: false
      call: kinesis-video-streams.createsignalingchannel
      outputParameters:
      - type: object
        mapping: $.
    - name: listsignalingchannels
      description: Returns an array of ChannelInfo objects.
      hints:
        readOnly: true
        idempotent: true
      call: kinesis-video-streams.listsignalingchannels
      outputParameters:
      - type: object
        mapping: $.
